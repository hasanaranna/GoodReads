name: CI/CD Pipeline - Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  issues: write
  packages: write

jobs:
  # Backend tests
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Create test .env file
        working-directory: ./backend
        run: |
          cat > .env << 'EOF'
          NODE_ENV=test
          PORT=8080
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=goodreads_test
          DB_USER=postgres
          DB_PASSWORD=postgres
          JWT_ACCESS_SECRET=test-secret-key-do-not-use-in-production
          JWT_REFRESH_SECRET=test-refresh-secret-key
          GOOGLE_BOOKS_API_KEY=test-key
          EOF

      - name: Run backend tests
        working-directory: ./backend
        run: npm test -- --coverage

      - name: Upload backend coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./backend/coverage/coverage-final.json
          flags: backend
          name: backend-coverage

  # Frontend tests
  frontend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Run frontend unit tests
        working-directory: ./frontend
        run: npm test -- --coverage --run

      - name: Run frontend build
        working-directory: ./frontend
        run: npm run build

      - name: Upload frontend coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

  # Linting
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run backend linting
        working-directory: ./backend
        run: npm run lint

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Run frontend linting
        working-directory: ./frontend
        run: npm run lint

  # Test results aggregation
  test-results:
    needs: [backend-tests, frontend-tests, lint]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.backend-tests.result }}" = "failure" ] || \
             [ "${{ needs.frontend-tests.result }}" = "failure" ] || \
             [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "❌ Some tests or linting checks failed"
            exit 1
          else
            echo "✅ All tests and linting checks passed"
          fi

      - name: Comment PR (optional)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All tests passed! This PR is ready for review.'
            })

  # Continuous deployment build step
  build:
    needs: [backend-tests, frontend-tests, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Log in to the GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Automatically uses GitHub username
          password: ${{ secrets.GITHUB_TOKEN }} # Automatically generated token

      # 2. Build and push the Backend Image
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/goodreads-backend:latest

      # 3. Build and push the Frontend Image 
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/goodreads-frontend:latest
  
  # continuous deployment final step
  deploy:
    name: Deploy to DO Droplet
    needs: build 
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout the code first so GitHub has the docker-compose.yml file
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Securely copy the docker-compose.yml to your Droplet
      - name: Copy docker-compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/root" # this should be in root directory

      # 3. SSH into the server and run the commands
      - name: Execute deployment commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          # script: |
          #   # Log in to the GitHub Container Registry
          #   echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
          #   # Navigate to the folder where we just copied the compose file
          #   cd /root
            
          #   # Pull the newly built images from GHCR
          #   docker compose pull
            
          #   # Restart the containers with the new images
          #   docker compose up -d
            
          #   # Clean up old images to prevent disk space issues
          #   docker image prune -f
          script: |
            cd /root
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f


  # Merge to main notification
  notify-merge:
    needs: [backend-tests, frontend-tests, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && success()

    steps:
      - name: Notify successful merge to main
        run: |
          echo "✅ Code successfully merged to main branch with all tests passing"