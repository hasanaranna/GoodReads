services:
  frontend:
    build: ./frontend
    container_name: goodreads-frontend
    ports:
      - "5173:5173"
    volumes:
      - /app/node_modules
      - ./frontend:/app:z
    environment:
      - CHOKIDAR_USEPOLLING=true

  backend:
    build: ./backend
    container_name: goodreads-backend
    ports:
      - "8080:8080"
    volumes:
      - /app/node_modules
      - ./backend:/app:z  
    environment:
      - NODE_ENV=development
      # Replace this with your Supabase Connection String
      # IMPORTANT: Use the Transaction Pooler URL (usually port 6543)
      - DATABASE_URL=postgresql://postgres.[your-project-ref]:[your-password]@aws-0-[region].pooler.supabase.com:6543/postgres
      - PORT=8080
      - JWT_ACCESS_SECRET=my_super_secret_access_key_123
      - JWT_REFRESH_SECRET=my_super_secret_refresh_key_456