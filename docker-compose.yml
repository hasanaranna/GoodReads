services:
  frontend:
    build: ./frontend     # Builds image from Dockerfile
    container_name: goodreads-frontend
    ports:
      - "5173:5173"
    volumes:
      - /app/node_modules # Prevents local node_modules from overwriting container's
      - ./frontend:/app    # Map the frontend folder to /app inside the container
      
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps with HMR on some systems (like Windows/WSL)