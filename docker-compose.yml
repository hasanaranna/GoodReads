services:
  frontend:
    build: ./frontend
    container_name: goodreads-frontend
    ports:
      - "5173:5173"
    volumes:
      - /app/node_modules
      - ./frontend:/app:z
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}

  backend:
    build: ./backend
    container_name: goodreads-backend
    ports:
      - "8080:8080"
    volumes:
      - /app/node_modules
      - ./backend:/app:z
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/goodreads}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-my_super_secret_access_key_123}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-my_super_secret_refresh_key_456}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      GOOGLE_BOOKS_BASE_URL: ${GOOGLE_BOOKS_BASE_URL:-https://www.googleapis.com/books/v1}
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: goodreads-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-goodreads}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data:z
      - ./init-scripts:/docker-entrypoint-initdb.d:z

volumes:
  db_data: